apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-sonar-demo
  namespace: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-sonar-demo
  template:
    metadata:
      labels:
        app: java-sonar-demo
    spec:
      containers:
      - name: java-sonar-demo
        image: 831103387233.dkr.ecr.ap-south-1.amazonaws.com/java-sonar-demo:main-11
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
