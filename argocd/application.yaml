apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-sonar-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-org>/java-sonar-argocd-manifests.git
    targetRevision: main
    path: java-app
  destination:
    server: https://kubernetes.default.svc
    namespace: java-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
